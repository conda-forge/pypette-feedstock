{% set name = "pypette" %}
{% set version = "0.0.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pypette-{{ version }}.tar.gz
  sha256: 594ff550090b036bd9fe2b788ddbf948d45c318abed2e7e2de8967745a2dc927

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - poetry-core >=1.0.0
    - python {{ python_min }}
  run:
    - python >={{ python_min }},<4.0
    - sphinx >=4.1.2,<5.0.0
    - crayons >=0.4.0,<0.5.0
    - sphinx-autobuild >=2021.3.14,<2022.0.0

test:
  imports:
    - pypette
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://csurfer.github.io/pypette
  dev_url: https://github.com/csurfer/pypette
  summary: Simple flow controller for building complex pipelines 
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
